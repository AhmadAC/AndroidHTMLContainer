<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Text Tracker</title>
    <style>
        :root {
            /* This tells the browser this app supports both themes and allows it to style UI elements like scrollbars */
            color-scheme: light dark;

            /* Light Mode (Default) */
            --bg-color: #f9fafb;
            --header-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-color: #3b82f6;
            --danger-color: #ef4444;
            --item-bg: #ffffff;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --header-bg: #1f2937;
                --text-main: #f3f4f6;
                --text-muted: #9ca3af;
                --border-color: #374151;
                --primary-color: #60a5fa;
                --danger-color: #ef4444;
                --item-bg: #1f2937;
            }
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background-color: var(--header-bg);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        #fileName {
            font-weight: 600;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        
        button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 8px;
            transition: background-color 0.2s;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 16px;
        }
        
        button:active { background-color: var(--border-color); }
        
        #undoBtn {
            color: var(--text-main);
            opacity: 0.3;
            pointer-events: none;
        }
        
        #undoBtn.active {
            opacity: 1;
            pointer-events: auto;
            color: var(--primary-color);
        }
        
        #undoBtn svg { width: 24px; height: 24px; }
        
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .list-container {
            display: flex;
            flex-direction: column;
        }
        
        .item-wrapper {
            position: relative;
            background-color: var(--danger-color);
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .item {
            background-color: var(--item-bg);
            padding: 16px;
            font-size: 16px;
            line-height: 1.5;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            touch-action: pan-y;
            position: relative;
            z-index: 1;
            will-change: transform;
        }
        
        .delete-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            z-index: 0;
        }
        
        .input-area {
            background-color: var(--header-bg);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.05);
        }
        
        #newItemInput {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            /* Explicitly set colors to ensure they change with the theme */
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        
        #newItemInput:focus { border-color: var(--primary-color); }
        
        #addBtn {
            background-color: var(--primary-color);
            color: white;
            border-radius: 24px;
            padding: 0 20px;
        }
        
        #addBtn:active { background-color: #2563eb; }
        
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span id="fileName">No File</span>
        </div>
        <div class="header-right">
            <button id="undoBtn" onclick="undo()" aria-label="Undo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                </svg>
            </button>
            <button onclick="openFile()">Open</button>
            <button onclick="saveAsFile()">Save As</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="list-container" id="list"></div>
    </main>

    <div class="input-area">
        <input type="text" id="newItemInput" placeholder="Add a new item..." autocomplete="off">
        <button id="addBtn" onclick="addItem()">Add</button>
    </div>

    <script>
        let items = [];
        let currentFileName = "";
        let undoStack = [];
        
        const listElement = document.getElementById('list');
        const fileNameElement = document.getElementById('fileName');
        const undoBtn = document.getElementById('undoBtn');
        const inputElement = document.getElementById('newItemInput');

        function init() {
            renderList();
            updateUndoBtn();
        }

        function saveState() {
            undoStack.push([...items]);
            updateUndoBtn();
        }

        function updateUndoBtn() {
            if (undoStack.length > 0) {
                undoBtn.classList.add('active');
            } else {
                undoBtn.classList.remove('active');
            }
        }

        function undo() {
            if (undoStack.length > 0) {
                items = undoStack.pop();
                renderList();
                updateUndoBtn();
                autoSave();
            }
        }

        function renderList() {
            listElement.innerHTML = '';
            
            if (items.length === 0) {
                listElement.innerHTML = '<div class="empty-state">List is empty</div>';
                return;
            }

            items.forEach((itemText, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'item-wrapper';

                const deleteBg = document.createElement('div');
                deleteBg.className = 'delete-bg';
                deleteBg.innerHTML = '<span>Delete</span><span>Delete</span>';
                wrapper.appendChild(deleteBg);

                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                itemDiv.innerText = itemText;

                let startX = 0;
                let startY = 0;
                let currentX = 0;
                let isSwiping = false;
                let isVertical = false;
                const swipeThreshold = Math.min(window.innerWidth * 0.4, 150);

                itemDiv.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    isSwiping = true;
                    isVertical = false;
                    itemDiv.style.transition = 'none';
                }, { passive: true });

                itemDiv.addEventListener('touchmove', (e) => {
                    if (!isSwiping) return;
                    
                    const deltaX = e.touches[0].clientX - startX;
                    const deltaY = e.touches[0].clientY - startY;
                    
                    if (!isVertical && Math.abs(deltaY) > Math.abs(deltaX) + 5) {
                        isVertical = true;
                        isSwiping = false;
                        itemDiv.style.transform = 'translateX(0)';
                        return;
                    }
                    
                    if (isVertical) return;

                    currentX = deltaX;
                    itemDiv.style.transform = `translateX(${currentX}px)`;
                }, { passive: true });

                itemDiv.addEventListener('touchend', () => {
                    if (!isSwiping) return;
                    isSwiping = false;
                    itemDiv.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    
                    if (Math.abs(currentX) > swipeThreshold) {
                        const direction = currentX > 0 ? 1 : -1;
                        itemDiv.style.transform = `translateX(${direction * window.innerWidth}px)`;
                        setTimeout(() => {
                            deleteItem(index);
                        }, 300);
                    } else {
                        itemDiv.style.transform = 'translateX(0)';
                    }
                    currentX = 0;
                });

                wrapper.appendChild(itemDiv);
                listElement.appendChild(wrapper);
            });
        }

        function addItem() {
            const text = inputElement.value.trim();
            if (text !== "") {
                saveState();
                items.push(text);
                inputElement.value = "";
                renderList();
                autoSave();
                
                const mainContent = document.getElementById('mainContent');
                mainContent.scrollTop = mainContent.scrollHeight;
            }
        }

        function deleteItem(index) {
            saveState();
            items.splice(index, 1);
            renderList();
            autoSave();
        }

        inputElement.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') addItem();
        });

        // ----- Android Bridge Functions -----

        function openFile() {
            if (window.AndroidBridge) AndroidBridge.openFilePicker();
        }

        function saveAsFile() {
            if (window.AndroidBridge) {
                const textContent = items.join('\n');
                const base64Content = btoa(unescape(encodeURIComponent(textContent)));
                const name = currentFileName || "NewList.txt";
                AndroidBridge.saveAsFile(base64Content, name);
            }
        }

        function autoSave() {
            if (window.AndroidBridge) {
                const textContent = items.join('\n');
                const base64Content = btoa(unescape(encodeURIComponent(textContent)));
                AndroidBridge.saveFile(base64Content);
            }
        }

            try {
                const textContent = decodeURIComponent(escape(atob(base64Content)));

                    items = [];

                    // Split by new line, and remove the final blank line if the file ends with one
                    let lines = textContent.split(/\r?\n/);
                    if (lines.length > 0 && lines[lines.length - 1] === "") {
                        lines.pop();
                    }
                    items = lines;
