<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Text Tracker</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg-color: #f9fafb;
            --header-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --primary-color: #3b82f6;
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --item-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #111827;
                --header-bg: #1f2937;
                --text-main: #f3f4f6;
                --text-muted: #9ca3af;
                --border-color: #374151;
                --primary-color: #60a5fa;
                --danger-color: #ef4444;
                --success-color: #4ade80;
                --item-bg: #1f2937;
            }
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background-color: var(--header-bg);
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        #fileName {
            font-weight: 600;
            font-size: 18px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        
        button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 8px;
            transition: background-color 0.2s;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 16px;
        }
        
        button:active { background-color: var(--border-color); }
        
        #undoBtn {
            color: var(--text-main);
            opacity: 0.3;
            pointer-events: none;
        }
        
        #undoBtn.active {
            opacity: 1;
            pointer-events: auto;
            color: var(--primary-color);
        }
        
        #undoBtn svg { width: 24px; height: 24px; }
        
        main {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .list-container {
            display: flex;
            flex-direction: column;
        }
        
        .item-wrapper {
            position: relative;
            background-color: var(--danger-color);
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .item {
            background-color: var(--item-bg);
            padding: 16px;
            font-size: 16px;
            line-height: 1.5;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            touch-action: pan-y;
            position: relative;
            z-index: 1;
            will-change: transform;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        
        .item-text {
            flex-grow: 1;
            word-break: break-word;
        }
        
        .task-checkbox {
            -webkit-appearance: none;
            appearance: none;
            background-color: transparent;
            margin: 0;
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            border: 2px solid var(--danger-color);
            border-radius: 50%;
            display: grid;
            place-content: center;
            transition: background-color 0.2s, border-color 0.2s;
        }
        
        .task-checkbox::before {
            content: "";
            width: 12px;
            height: 12px;
            transform: scale(0);
            transition: 0.1s transform ease-in-out;
            box-shadow: inset 1em 1em var(--item-bg);
            background-color: var(--item-bg);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .task-checkbox:checked {
            background-color: var(--success-color);
            border-color: var(--success-color);
        }
        
        .task-checkbox:checked::before {
            transform: scale(1);
        }

        .delete-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: bold;
            z-index: 0;
        }
        
        .input-area {
            background-color: var(--header-bg);
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            box-shadow: 0 -1px 2px rgba(0,0,0,0.05);
        }
        
        #newItemInput {
            flex-grow: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
        
        #newItemInput:focus { border-color: var(--primary-color); }
        
        #addBtn {
            background-color: var(--primary-color);
            color: white;
            border-radius: 24px;
            padding: 0 20px;
        }
        
        #addBtn:active { background-color: #2563eb; }
        
        .empty-state {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <span id="fileName">No File</span>
        </div>
        <div class="header-right">
            <button id="undoBtn" onclick="undo()" aria-label="Undo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6" />
                </svg>
            </button>
            <button onclick="openFile()">Open</button>
            <button onclick="saveAsFile()">Save As</button>
        </div>
    </header>

    <main id="mainContent">
        <div class="list-container" id="list"></div>
    </main>

    <div class="input-area">
        <input type="text" id="newItemInput" placeholder="Add a new item..." autocomplete="off">
        <button id="addBtn" onclick="addItem()">Add</button>
    </div>

    <script>
        function utf8_to_b64(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
                function toSolidBytes(match, p1) { return String.fromCharCode('0x' + p1); }
            ));
        }

        function b64_to_utf8(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        let items = [];
        let currentFileName = "";
        let undoStack = [];
        
        const listElement = document.getElementById('list');
        const fileNameElement = document.getElementById('fileName');
        const undoBtn = document.getElementById('undoBtn');
        const inputElement = document.getElementById('newItemInput');

        function init() {
            renderList();
            updateUndoBtn();
        }

        function saveState() {
            undoStack.push(JSON.parse(JSON.stringify(items)));
            updateUndoBtn();
        }

        function updateUndoBtn() {
            undoBtn.classList.toggle('active', undoStack.length > 0);
        }

        function undo() {
            if (undoStack.length > 0) {
                items = undoStack.pop();
                renderList();
                updateUndoBtn();
                autoSave();
            }
        }

        function renderList() {
            listElement.innerHTML = '';
            
            if (items.length === 0) {
                listElement.innerHTML = '<div class="empty-state">List is empty</div>';
                return;
            }

            items.forEach((item, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'item-wrapper';

                const deleteBg = document.createElement('div');
                deleteBg.className = 'delete-bg';
                deleteBg.innerHTML = '<span>Delete</span><span>Delete</span>';
                wrapper.appendChild(deleteBg);

                const itemDiv = document.createElement('div');
                itemDiv.className = 'item';
                
                const itemTextSpan = document.createElement('span');
                itemTextSpan.className = 'item-text';
                itemTextSpan.innerText = item.text;

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'task-checkbox';
                checkbox.checked = item.checked;
                checkbox.addEventListener('change', () => toggleChecked(index));

                itemDiv.appendChild(itemTextSpan);
                itemDiv.appendChild(checkbox);

                let startX = 0, currentX = 0, isSwiping = false, isVertical = false;
                const swipeThreshold = Math.min(window.innerWidth * 0.4, 150);

                itemDiv.addEventListener('touchstart', (e) => {
                    startX = e.touches[0].clientX;
                    isSwiping = true;
                    isVertical = false;
                    itemDiv.style.transition = 'none';
                }, { passive: true });

                itemDiv.addEventListener('touchmove', (e) => {
                    if (!isSwiping) return;
                    const deltaX = e.touches[0].clientX - startX;
                    if (!isVertical && Math.abs(e.touches[0].clientY - startY) > Math.abs(deltaX) + 5) {
                        isVertical = true;
                        isSwiping = false;
                        itemDiv.style.transform = 'translateX(0)';
                        return;
                    }
                    if (isVertical) return;
                    currentX = deltaX;
                    itemDiv.style.transform = `translateX(${currentX}px)`;
                }, { passive: true });

                itemDiv.addEventListener('touchend', () => {
                    if (!isSwiping || isVertical) return;
                    isSwiping = false;
                    itemDiv.style.transition = 'transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
                    if (Math.abs(currentX) > swipeThreshold) {
                        itemDiv.style.transform = `translateX(${currentX > 0 ? 1 : -1 * window.innerWidth}px)`;
                        setTimeout(() => deleteItem(index), 300);
                    } else {
                        itemDiv.style.transform = 'translateX(0)';
                    }
                    currentX = 0;
                });

                wrapper.appendChild(itemDiv);
                listElement.appendChild(wrapper);
            });
        }

        function addItem() {
            const text = inputElement.value.trim();
            if (text !== "") {
                saveState();
                items.push({ text: text, checked: false });
                inputElement.value = "";
                renderList();
                autoSave();
                document.getElementById('mainContent').scrollTop = document.getElementById('mainContent').scrollHeight;
            }
        }

        function deleteItem(index) {
            saveState();
            items.splice(index, 1);
            renderList();
            autoSave();
        }

        function toggleChecked(index) {
            saveState();
            items[index].checked = !items[index].checked;
            autoSave();
        }

        inputElement.addEventListener('keypress', (e) => { if (e.key === 'Enter') addItem(); });

        function getContentString() {
            return items.map(item => `${item.checked ? '[x]' : '[ ]'} ${item.text}`).join('\n');
        }

        function openFile() {
            try { if (window.AndroidBridge) AndroidBridge.openFilePicker(); } 
            catch (e) { console.error("Error calling openFilePicker:", e); alert("Could not open file picker."); }
        }

        function saveAsFile() {
            try {
                if (window.AndroidBridge) {
                    const base64Content = utf8_to_b64(getContentString());
                    const name = currentFileName || "NewList.txt";
                    AndroidBridge.saveAsFile(base64Content, name);
                }
            } catch (e) { console.error("Error during saveAsFile:", e); alert("Could not save the file."); }
        }

        function autoSave() {
            try {
                if (window.AndroidBridge) {
                    const base64Content = utf8_to_b64(getContentString());
                    AndroidBridge.saveFile(base64Content);
                }
            } catch (e) { console.error("Error during autoSave:", e); }
        }

        function loadFromAndroid(base64Content, fileName) {
            try {
                const textContent = b64_to_utf8(base64Content);
                if (textContent.trim() === "") {
                    items = [];
                } else {
                    let lines = textContent.split(/\r?\n/);
                    if (lines.length > 0 && lines[lines.length - 1] === "") lines.pop();
                    
                    items = lines.map(line => {
                        const isChecked = line.startsWith('[x] ');
                        const isUnchecked = line.startsWith('[ ] ');
                        const text = (isChecked || isUnchecked) ? line.substring(4) : line;
                        return { text: text, checked: isChecked };
                    });
                }
                currentFileName = fileName;
                fileNameElement.innerText = fileName;
                undoStack = [];
                renderList();
                updateUndoBtn();
            } catch (e) {
                console.error("Error loading file:", e);
                alert("Could not load or parse the file.");
                items = [];
                currentFileName = "Error.txt";
                fileNameElement.innerText = currentFileName;
                renderList();
            }
        }

        function onSaveSuccess() { console.log("Auto-save successful."); }
        function onSaveError() { console.error("Auto-save failed."); alert("Error: Could not save the file."); }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
