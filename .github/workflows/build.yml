name: Build Android App

# ---------------------------------------------------------
# CHANGE THESE VARIABLES TO UPDATE YOUR APP NAME & VERSION
# ---------------------------------------------------------
env:
  APP_NAME: "Text Tracker Pro"
  APP_VERSION: "1.0.1"
  VERSION_CODE: 2
# ---------------------------------------------------------

on:
  push:
    branches: [ "main" ] # Runs every time you push to main
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # This step automatically finds and replaces the name/version in your project files
    - name: Update App Name and Version
      run: |
        # Update App Name in strings.xml
        sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">${{ env.APP_NAME }}<\/string>/g" app/src/main/res/values/strings.xml
        
        # Update Version Name and Code in build.gradle
        sed -i "s/versionName .*/versionName \"${{ env.APP_VERSION }}\"/g" app/build.gradle
        sed -i "s/versionCode .*/versionCode ${{ env.VERSION_CODE }}/g" app/build.gradle

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        # Dynamically names the downloaded artifact based on your variables above!
        name: ${{ env.APP_NAME }}-v${{ env.APP_VERSION }}
        path: app/build/outputs/apk/debug/app-debug.apk
